<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - BeautyShop</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/estilos.css">

    <!-- ICONOS -->
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

    <main class="contenedor-carrito">

        <!-- ENCABEZADO -->
        <header class="encabezado-carrito">

            <h1>
                <i class='bx bx-shopping-bag'></i>
                Mi Carrito
            </h1>

            <a href="../index.html">
                <i class='bx bx-arrow-back'></i>
                Volver a la tienda
            </a>

        </header>

        <!-- LISTA DE PRODUCTOS -->
        <section id="lista-carrito" class="lista-carrito">
        </section>

        <!-- MENSAJE CARRITO VACÍO -->
        <div id="carrito-vacio" hidden>
            <h2>Tu carrito está vacío</h2>
            <p>Agrega productos desde el catálogo.</p>
        </div>

        <!-- RESUMEN -->
        <aside class="resumen-carrito">

            <h2>Resumen del Pedido</h2>

            <p>
                <span>Subtotal</span>
                <span id="subtotal-carrito">$0</span>
            </p>

            <p>
                <span>Descuento</span>
                <span id="descuento-carrito">$0</span>
            </p>

            <p class="total-carrito">
                <strong>Total</strong>
                <strong id="total-carrito">$0</strong>
            </p>

            <button id="boton-comprar">
                Finalizar Compra
            </button>

            <button id="boton-vaciar">
                Vaciar Carrito
            </button>

        </aside>

    </main>

    <!-- IMPORTANTE -->
    <script src="../js/data.js"></script>
    <script src="../js/carrito.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - LUMINA K-Beauty</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- Estilos -->
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

  <div class="contenedor-principal">

    <!-- Barra lateral izquierda -->
    <aside class="barra-lateral">
      <div class="logo">
        <h1 class="logo-nombre">LUMINA</h1>
        <p class="logo-slogan">K-BEAUTY CURATION</p>
      </div>

      <nav class="navegacion-lateral">
        <ul class="lista-navegacion">
          <li class="opcion-navegacion">
            <a href="../index.html"><i class="ph ph-squares-four"></i> Catálogo</a>
          </li>
          <li class="opcion-navegacion activa">
            <a href="perfil.html"><i class="ph ph-user"></i> Mi Perfil</a>
          </li>
          <li class="opcion-navegacion">
            <a href="publicar.html"><i class="ph ph-plus-circle"></i> Publicar</a>
          </li>
        </ul>
      </nav>

      <div class="acciones-soporte">
        <a href="#" class="enlace-soporte"><i class="ph ph-question"></i> Help Center</a>
        <a href="../index.html" class="boton-unirse">Volver al Inicio</a>
      </div>
    </aside>

    <!-- Zona principal -->
    <main class="contenido-principal">

      <!-- Barra superior -->
      <header class="barra-superior">
        <h2 class="titulo-seccion">Mi Perfil</h2>
        <div class="acciones-usuario">
          <a href="carrito.html" class="icono-bolsa">
            <i class="ph ph-shopping-bag"></i>
          </a>
        </div>
      </header>

      <!-- Contenido de Perfil -->
      <section class="contenedor-formulario-perfil">
        <div class="tarjeta-perfil">
          <div class="cabecera-perfil">
            <div class="avatar-perfil">
              <i class="ph ph-user-circle"></i>
            </div>
            <div class="info-basica">
              <h3>Ana Sofía</h3>
              <p>ana.sofia@glow.com</p>
            </div>
          </div>
          
          <form class="formulario-perfil">
            <h4 class="subtitulo-formulario">Datos Personales</h4>
            <div class="grupo-input">
              <label>Nombre Completo</label>
              <input type="text" value="Ana Sofía">
            </div>
            <div class="grupo-input">
              <label>Correo Electrónico</label>
              <input type="email" value="ana.sofia@glow.com">
            </div>
            <div class="grupo-input">
              <label>Teléfono</label>
              <input type="tel" placeholder="+52 555 123 4567">
            </div>

            <h4 class="subtitulo-formulario">Dirección de Envío</h4>
            <div class="grupo-input">
              <label>Calle y Número</label>
              <input type="text" placeholder="Ej. Avenida Reforma 123">
            </div>
            <div class="grupo-input doble">
              <div>
                <label>Ciudad</label>
                <input type="text" placeholder="Ciudad de México">
              </div>
              <div>
                <label>Código Postal</label>
                <input type="text" placeholder="01000">
              </div>
            </div>

            <button type="submit" class="boton-comprar-ahora" style="width: 100%; margin-top: 20px;">Guardar Cambios</button>
          </form>
        </div>
      </section>

    </main>

  </div>

</body>
</html>
